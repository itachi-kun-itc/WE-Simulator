name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject version into assets
        run: npm run inject-version

      - name: Prepare static site
        run: |
          mkdir -p dist
          cp -R web/. dist/
          rm -f dist/dev-server.js

      - name: Deploy to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx gh-pages -d dist -b gh-pages -u "github-actions-bot <github-actions-bot@users.noreply.github.com>" -r "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Detect weather quiz question changes
        if: github.event_name == 'push'
        id: weather-quiz-changes
        shell: bash
        run: |
          if git diff --quiet "${{ github.event.before }}" "${{ github.sha }}" -- web/data/weather_forecaster_quiz_questions.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync changed weather quiz questions to Google Sheets
        if: github.event_name == 'push' && steps.weather-quiz-changes.outputs.changed == 'true'
        env:
          APPS_SCRIPT_ENDPOINT_URL: ${{ secrets.APPS_SCRIPT_ENDPOINT_URL }}
          WEATHER_QUIZ_SYNC_TOKEN: ${{ secrets.WEATHER_QUIZ_SYNC_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          test -n "$APPS_SCRIPT_ENDPOINT_URL"
          test -n "$WEATHER_QUIZ_SYNC_TOKEN"
          response="$(curl --fail --silent --show-error \
            --location \
            --retry 3 \
            --header "Content-Type: text/plain;charset=utf-8" \
            --data "$(jq -nc --arg token "$WEATHER_QUIZ_SYNC_TOKEN" --arg sha "$COMMIT_SHA" '{action:"syncWeatherQuizQuestionLists",syncToken:$token,commitSha:$sha}')" \
            "$APPS_SCRIPT_ENDPOINT_URL")"
          echo "$response" | jq -e '.ok == true'
